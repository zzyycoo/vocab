.header{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;padding:20px 16px 16px;text-align:center}

.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s,box-shadow .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.97)}
.card-title{font-size:16px;font-weight:600;color:#333;margin-bottom:4px}
.card-sub{font-size:13px;color:#999}
.card-green{border-left:4px solid #43a047}

.card-purple{border-left:4px solid #9c27b0}

.word-display .meaning{font-size:20px;color:#555;margin-bottom:20px}

.btn-prev,.btn-next{background:#e8f5e9;color:#2e7d32}

.btn-master.mastered{background:#e0e0e0;color:#999}
.tier-info{font-size:14px;color:#666;text-align:center;margin-bottom:8px}
.back-btn{background:none;border:none;color:#43a047;font-size:14px;cursor:pointer;padding:8px 0;display:inline-block}

</div>

var highWords = allWords.slice(0, 800);
var midWords = allWords.slice(800, 2150);
var lowWords = allWords.slice(2150);

var currentTier = null;
var currentIndex = 0;
var learnedSet = new Set(JSON.parse(localStorage.getItem('learned') || '[]'));
var wrongSet = JSON.parse(localStorage.getItem('wrong') || '[]');
var testCount = parseInt(localStorage.getItem('testCount') || '0');
var testCorrect = parseInt(localStorage.getItem('testCorrect') || '0');
var wrongList = JSON.parse(localStorage.getItem('wrongList') || '[]');

function saveLearned() { localStorage.setItem('learned', JSON.stringify(Array.from(learnedSet))); }
function saveWrong() { localStorage.setItem('wrong', JSON.stringify(wrongSet)); }
function saveWrongList() { localStorage.setItem('wrongList', JSON.stringify(wrongList)); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function updateTabs() {
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
}

// Tab navigation
document.querySelectorAll('.tab-item').forEach(function(tab) {
  tab.addEventListener('click', function() {
    var t = this.getAttribute('data-tab');
    updateTabs();
    this.classList.add('active');
    if (t === 'home') showScreen('home-screen');
    else if (t === 'test-tab') { showScreen('test-screen'); startTest(); }
    else if (t === 'review-tab') { showScreen('review-screen'); renderReview(); }
    else if (t === 'stats-tab') { showScreen('stats-screen'); updateStats(); }
  });
});

// Home card clicks
document.querySelectorAll('[data-tier]').forEach(function(card) {
  card.addEventListener('click', function() {
    var tier = this.getAttribute('data-tier');
    currentTier = tier;
    currentIndex = 0;
    openTier(tier);
  });
});

document.getElementById('card-test').addEventListener('click', function() {
  showScreen('test-screen');
  updateTabs();
  startTest();
});

document.getElementById('card-review').addEventListener('click', function() {
  showScreen('review-screen');
  updateTabs();
  renderReview();
});

document.getElementById('card-stats').addEventListener('click', function() {
  showScreen('stats-screen');
  updateTabs();
  updateStats();
});

// Tier navigation
function getTierWords(tier) {
  if (tier === 'high') return highWords;
  if (tier === 'mid') return midWords;
  return lowWords;
}

function openTier(tier) {
  var words = getTierWords(tier);
  var names = {high:'高频词汇', mid:'中频词汇', low:'低频词汇'};
  document.getElementById('tier-title').textContent = names[tier] || '词汇';
  document.getElementById('tier-info').textContent = words.length + '词';
  currentIndex = 0;
  showWord(tier);
  showScreen('tier-screen');
}

function showWord(tier) {
  var words = getTierWords(tier);
  if (!words.length) return;
  var w = words[currentIndex];
  document.getElementById('tier-word').textContent = w.word;
  document.getElementById('tier-pos').textContent = w.pos;
  document.getElementById('tier-meaning').textContent = w.meaning;
  document.getElementById('tier-counter').textContent = (currentIndex + 1) + ' / ' + words.length;
  var btn = document.getElementById('tier-master');
  var key = tier + '-' + currentIndex;
  if (learnedSet.has(key)) {
    btn.textContent = '已掌握 ✓';
    btn.classList.add('mastered');
  } else {
    btn.textContent = '掌握了';
    btn.classList.remove('mastered');
  }
}

document.getElementById('tier-back').addEventListener('click', function() {
  showScreen('home-screen');
});

document.getElementById('tier-prev').addEventListener('click', function() {
  if (!currentTier) return;
  if (currentIndex > 0) { currentIndex--; showWord(currentTier); }
});

document.getElementById('tier-next').addEventListener('click', function() {
  if (!currentTier) return;
  var words = getTierWords(currentTier);
  if (currentIndex < words.length - 1) { currentIndex++; showWord(currentTier); }
});

document.getElementById('tier-master').addEventListener('click', function() {
  if (!currentTier) return;
  var key = currentTier + '-' + currentIndex;
  if (learnedSet.has(key)) {
    learnedSet.delete(key);
  } else {
    learnedSet.add(key);
  }
  saveLearned();
  showWord(currentTier);
});

// Test
var testQuestions = [];
var testIndex = 0;
var testAnswers = [];
var testScore = 0;

function startTest() {
  testQuestions = [];
  testIndex = 0;
  testAnswers = [];
  testScore = 0;
  // Pick 20 random words from all words
  var pool = allWords.slice();
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  testQuestions = pool.slice(0, 20);
  renderQuestion();
}

function renderQuestion() {
  if (testIndex >= 20) {
    renderTestResult();
    return;
  }
  var q = testQuestions[testIndex];
  // Generate 4 options: 1 correct + 3 random wrong meanings
  var options = [q.meaning];
  var wrongPool = allWords.filter(function(w) { return w.meaning !== q.meaning; });
  for (var i = wrongPool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = wrongPool[i]; wrongPool[i] = wrongPool[j]; wrongPool[j] = tmp;
  }
  for (var k = 0; k < 3 && k < wrongPool.length; k++) {
    options.push(wrongPool[k].meaning);
  }
  // Shuffle options
  for (var m = options.length - 1; m > 0; m--) {
    var n = Math.floor(Math.random() * (m + 1));
    var tmp = options[m]; options[m] = options[n]; options[n] = tmp;
  }
  var answered = testAnswers[testIndex];
  var html = '<div class="quiz-question">';
  html += '<div class="q-progress">第 ' + (testIndex + 1) + ' / 20 题</div>';
  html += '<div class="q-word">' + q.word + '</div>';
  html += '<div style="font-size:14px;color:#999;margin-bottom:16px">' + q.pos + '</div>';
  html += '<div class="quiz-options">';
  for (var o = 0; o < options.length; o++) {
    var cls = 'quiz-option';
    if (answered !== undefined) {
      if (options[o] === q.meaning) cls += ' reveal-correct';
      if (answered === o && options[o] !== q.meaning) cls += ' wrong';
      if (answered === o && options[o] === q.meaning) cls += ' correct';
    }
    html += '<div class="' + cls + '" data-opt="' + o + '" data-meaning="' + options[o].replace(/"/g,'&quot;') + '" data-correct="' + (options[o] === q.meaning ? '1' : '0') + '">' + options[o] + '</div>';
  }
  html += '</div></div>';
  document.getElementById('test-content').innerHTML = html;
  if (answered === undefined) {
    document.querySelectorAll('.quiz-option').forEach(function(el) {
      el.addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-opt'));
        var isCorrect = this.getAttribute('data-correct') === '1';
        testAnswers[testIndex] = idx;
        if (isCorrect) testScore++;
        renderQuestion();
        // After showing answer, auto advance after 1.5s
        setTimeout(function() {
          if (testIndex < 20) {
            testIndex++;
            renderQuestion();
          }
        }, 1500);
      });
    });
  } else {
    // Already answered, advance after a moment
    setTimeout(function() {
      if (testIndex < 20) {
        testIndex++;
        renderQuestion();
      }
    }, 1500);
  }
}

function renderTestResult() {
  testCount++;
  testCorrect += testScore;
  localStorage.setItem('testCount', String(testCount));
  localStorage.setItem('testCorrect', String(testCorrect));
  var pct = Math.round(testScore / 20 * 100);
  var html = '<div class="quiz-result">';
  html += '<h2 style="font-size:20px;color:#333">测试完成！</h2>';
  html += '<div class="score">' + testScore + ' / 20</div>';
  html += '<div class="detail">正确率 ' + pct + '%</div>';
  html += '<button class="btn-primary" id="test-again">再来一次</button>';
  html += '<br><button class="btn-secondary" id="test-home">返回首页</button>';
  html += '</div>';
  document.getElementById('test-content').innerHTML = html;
  document.getElementById('test-again').addEventListener('click', function() { startTest(); });
  document.getElementById('test-home').addEventListener('click', function() {
    showScreen('home-screen');
    updateTabs();
    document.querySelectorAll('.tab-item')[0].classList.add('active');
  });
}

// Review
function renderReview() {
  var list = document.getElementById('review-list');
  if (!wrongList.length) {
    list.innerHTML = '<div class="empty-msg">暂无错题，继续加油！</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < wrongList.length; i++) {
    var w = wrongList[i];
    html += '<div class="review-item">';
    html += '<div><div class="r-word">' + w.word + '</div><div class="r-pos">' + w.pos + '</div><div class="r-meaning">' + w.meaning + '</div></div>';
    html += '</div>';
  }
  list.innerHTML = html;
}

// Stats
function updateStats() {
  document.getElementById('stat-learned').textContent = learnedSet.size;
  document.getElementById('stat-tests').textContent = testCount;
  document.getElementById('stat-accuracy').textContent = testCount > 0 ? Math.round(testCorrect / (testCount * 20) * 100) + '%' : '0%';
}

document.getElementById('stats-reset').addEventListener('click', function() {
  if (confirm('确定要重置所有学习数据吗？')) {
    learnedSet = new Set();
    wrongList = [];
    testCount = 0;
    testCorrect = 0;
    saveLearned();
    localStorage.setItem('wrongList', '[]');
    localStorage.setItem('testCount', '0');
    localStorage.setItem('testCorrect', '0');
    updateStats();
  }
});

// Initialize
updateStats();
</script>
</body>
</html>
